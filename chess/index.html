<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>VS Code Chess vs Computer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="theme-classic">
  <div class="app-wrapper">
    <header class="app-header">
      <h1>Chess vs Computer</h1>
      <div class="controls-row">
        <label>
          Difficulty
          <select id="difficulty-select">
            <option value="easy">Easy</option>
            <option value="medium" selected>Medium</option>
            <option value="hard">Hard</option>
          </select>
        </label>
        <label>
          Theme
          <select id="theme-select">
            <option value="classic" selected>Classic</option>
            <option value="dark">Dark</option>
            <option value="neo">Neon</option>
          </select>
        </label>
        <button id="restart-btn">Restart</button>
        <button id="undo-btn">Undo</button>
      </div>
    </header>

    <main class="app-main">
      <section class="board-section">
        <div id="board" class="board"></div>
        <div class="board-footer">
          <div id="status" class="status-text">White to move</div>
        </div>
      </section>

      <aside class="side-panel">
        <div class="panel-block">
          <h2>Captured Pieces</h2>
          <div class="captured-wrapper">
            <div>
              <h3>White</h3>
              <div id="captured-white" class="captured-row"></div>
            </div>
            <div>
              <h3>Black</h3>
              <div id="captured-black" class="captured-row"></div>
            </div>
          </div>
        </div>

        <div class="panel-block">
          <h2>Move History</h2>
          <ol id="move-history" class="move-history"></ol>
        </div>
      </aside>
    </main>
  </div>

  <audio id="move-sound" src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=" preload="auto"></audio>

  <script src="chess.js"></script>
</body>
</html>
